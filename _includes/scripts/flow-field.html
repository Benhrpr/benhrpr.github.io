<script>
const canvas = document.createElement('canvas');
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// Shooting star setup
const stars = [];
const maxStars = 3;

class ShootingStar {
  constructor() {
    this.reset();
  }

  reset() {
    // Spawn anywhere along the top
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height * 0.2; // top 20%
    this.len = Math.random() * 100 + 50;
    this.speed = Math.random() * 6 + 4;
    // Diagonal downward
    this.vx = this.speed;
    this.vy = this.speed * (Math.random() * 0.5 + 0.3);
    this.opacity = 1;
    this.fade = Math.random() * 0.02 + 0.01;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.opacity -= this.fade;
    if (
      this.opacity <= 0 ||
      this.x > canvas.width + this.len ||
      this.y > canvas.height + this.len
    ) {
      this.reset();
    }
  }

  draw() {
    // Calculate end of tail along actual velocity
    const tailX = this.x - this.vx * this.len / this.speed;
    const tailY = this.y - this.vy * this.len / this.speed;

    const grad = ctx.createLinearGradient(this.x, this.y, tailX, tailY);
    grad.addColorStop(0, `rgba(255,255,255,${this.opacity})`);
    grad.addColorStop(1, 'rgba(255,255,255,0)');

    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(tailX, tailY);
    ctx.stroke();
  }
}

// Initialize
for (let i = 0; i < maxStars; i++) stars.push(new ShootingStar());

function animate() {
  // Black background with slight fade for trails
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Occasionally add new stars if under max
  if (stars.length < maxStars && Math.random() < 0.01) {
    stars.push(new ShootingStar());
  }

  stars.forEach(star => {
    star.update();
    star.draw();
  });

  requestAnimationFrame(animate);
}

animate();
</script>
