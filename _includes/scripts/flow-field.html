<script>
const canvas = document.createElement('canvas');
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// Shooting star setup
const stars = [];
const maxStars = 5; // subtle

class ShootingStar {
  constructor() {
    this.reset();
  }

  reset() {
    // Randomly spawn from left edge or top edge
    if (Math.random() < 0.5) {
      // Left edge
      this.x = 0;
      this.y = Math.random() * canvas.height;
    } else {
      // Top edge
      this.x = Math.random() * canvas.width;
      this.y = 0;
    }

    this.len = Math.random() * 120 + 80; // tail length
    this.speed = Math.random() * 5 + 3;  // speed
    // Diagonal downward toward bottom-right
    this.angle = Math.random() * 0.3 + 0.2; // slight variation
    this.vx = this.speed;
    this.vy = this.speed * this.angle;
    this.opacity = 1;
    this.fade = Math.random() * 0.005 + 0.002; // slow fade
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.opacity -= this.fade;
    if (
      this.opacity <= 0 ||
      this.x > canvas.width + this.len ||
      this.y > canvas.height + this.len
    ) {
      this.reset();
    }
  }

  draw() {
    // Tail along velocity vector
    const tailX = this.x - this.vx * this.len / this.speed;
    const tailY = this.y - this.vy * this.len / this.speed;

    const grad = ctx.createLinearGradient(this.x, this.y, tailX, tailY);
    grad.addColorStop(0, `rgba(255,255,255,${this.opacity})`);
    grad.addColorStop(1, 'rgba(255,255,255,0)');

    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(tailX, tailY);
    ctx.stroke();
  }
}

// Initialize stars
for (let i = 0; i < maxStars; i++) stars.push(new ShootingStar());

function animate() {
  // Black background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Occasionally add new stars if under max
  if (stars.length < maxStars && Math.random() < 0.005) {
    stars.push(new ShootingStar());
  }

  stars.forEach(star => {
    star.update();
    star.draw();
  });

  requestAnimationFrame(animate);
}

animate();
</script>
