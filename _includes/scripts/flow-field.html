<script>
const canvas = document.createElement('canvas');
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// Shooting star setup
const stars = [];
const maxStars = 3; // subtle

class ShootingStar {
  constructor() {
    this.reset();
  }
  
  reset() {
    // Spawn anywhere along top and slightly above for diagonal entry
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * -canvas.height * 0.2; 
    this.len = Math.random() * 100 + 50;
    this.speed = Math.random() * 6 + 4;
    // Diagonal downward to the right
    this.vx = this.speed;
    this.vy = this.speed * (Math.random() * 0.5 + 0.3); // small variation
    this.opacity = 1;
    this.fade = Math.random() * 0.02 + 0.01;
  }
  
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.opacity -= this.fade;
    if (
      this.opacity <= 0 || 
      this.x > canvas.width + this.len || 
      this.y > canvas.height + this.len
    ) {
      this.reset();
    }
  }
  
  draw() {
    const grad = ctx.createLinearGradient(
      this.x, this.y,
      this.x - this.len, this.y - this.len * 0.4
    );
    grad.addColorStop(0, `rgba(255,255,255,${this.opacity})`);
    grad.addColorStop(1, `rgba(255,255,255,0)`);
    
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x - this.len, this.y - this.len * 0.4);
    ctx.stroke();
  }
}

// Start with a few stars
for (let i = 0; i < maxStars; i++) stars.push(new ShootingStar());

function animate() {
  // Black background with fading trails
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Occasionally spawn new stars if under max
  if (stars.length < maxStars && Math.random() < 0.01) {
    stars.push(new ShootingStar());
  }

  stars.forEach(star => {
    star.update();
    star.draw();
  });

  requestAnimationFrame(animate);
}

animate();
</script>
