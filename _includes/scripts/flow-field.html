<script>
const canvas = document.createElement('canvas');
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// Shooting star setup
const stars = [];
const maxStars = 5; // max simultaneous shooting stars

// Shooting star class
class ShootingStar {
  constructor() {
    this.reset();
  }
  
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height * 0.5; // top half of screen
    this.len = Math.random() * 80 + 50;
    this.speed = Math.random() * 8 + 4;
    this.angle = Math.random() * 0.2 - 0.1; // slight angle
    this.opacity = 1;
    this.fade = Math.random() * 0.01 + 0.005;
  }
  
  update() {
    this.x += this.speed;
    this.y += this.speed * this.angle;
    this.opacity -= this.fade;
    if (this.opacity <= 0 || this.x > canvas.width || this.y > canvas.height) {
      this.reset();
    }
  }
  
  draw() {
    ctx.strokeStyle = `rgba(255,255,255,${this.opacity})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x - this.len, this.y - this.len * this.angle);
    ctx.stroke();
  }
}

// Add initial shooting stars
for (let i = 0; i < maxStars; i++) {
  if (Math.random() < 0.5) stars.push(new ShootingStar());
}

function animate() {
  // Black background
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Occasionally spawn new stars
  if (stars.length < maxStars && Math.random() < 0.02) {
    stars.push(new ShootingStar());
  }

  // Update and draw stars
  stars.forEach(star => {
    star.update();
    star.draw();
  });

  requestAnimationFrame(animate);
}

animate();
</script>
